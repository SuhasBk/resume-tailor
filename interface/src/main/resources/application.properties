# =====================================================================
# Interface Service – Application Configuration
# =====================================================================
spring.application.name=interface-service

# -------  Server  ----------------------------------------------------
server.port=8080

# -------  DataSource (PostgreSQL)  -----------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tailor}
spring.datasource.username=${DB_USER:tailor}
spring.datasource.password=${DB_PASSWORD:tailor}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------  JPA / Hibernate  -------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# -------  Multipart uploads  -----------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# -------  Brain Service  ---------------------------------------------
brain.service.base-url=${BRAIN_BASE_URL:http://localhost:8000}
brain.service.tailor-path=/tailor

# -------  Actuator / Prometheus  -------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.metrics.tags.application=${spring.application.name}

# -------  Logging  ---------------------------------------------------
logging.level.com.tailor=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# -------  Virtual Threads (Java 21+, no-op on Java 17)  -------------
spring.threads.virtual.enabled=true
