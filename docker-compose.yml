# =====================================================================
# Observed-AI — Full Stack Compose
# Services: db, brain, interface, prometheus, grafana
# =====================================================================

configs:

  prometheus_config:
    content: |
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']

        - job_name: 'brain-service'
          static_configs:
            - targets: ['brain-service:8000']
          metrics_path: '/metrics'
          scrape_timeout: 10s
  
        - job_name: 'interface-service'
          static_configs:
            - targets: ['interface-service:8080']
          metrics_path: '/actuator/prometheus'
          scrape_timeout: 10s

  grafana_datasource:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false

services:

  # ----------------------------------------------------------------
  # PostgreSQL 16 — persistent store for sessions and chat history
  # ----------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: db
    env_file:
      - secret.env
    environment:
      POSTGRES_DB: tailor
      POSTGRES_USER: tailor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tailor -d tailor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------------
  # Brain Service (Python / FastAPI)
  # ----------------------------------------------------------------
  brain-service:
    build:
      context: ./brain
    container_name: brain-service
    ports:
      - "8000:8000"
    env_file:
      - ./brain/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------
  # Interface Service (Spring Boot / Java 21)
  # ----------------------------------------------------------------
  interface-service:
    build:
      context: ./interface
    container_name: interface-service
    ports:
      - "8080:8080"
    env_file:
      - secret.env
    environment:
      DB_URL: jdbc:postgresql://db:5432/tailor
      DB_USER: tailor
      BRAIN_BASE_URL: http://brain-service:8000
      BRAIN_TAILOR_PATH: /tailor
    depends_on:
      db:
        condition: service_healthy
      brain-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------------
  # Prometheus
  # ----------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped
    configs:
      - source: prometheus_config
        target: /etc/prometheus/prometheus.yml
    depends_on:
      - interface-service
      - brain-service

  # ----------------------------------------------------------------
  # Grafana
  # ----------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/datasource.yml
    env_file:
      - secret.env
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:     # persists all session and chat data
  prometheus_data:   # persists metrics across restarts
  grafana_data:      # persists dashboards across restarts